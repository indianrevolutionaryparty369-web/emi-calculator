<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional EMI Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; color: #333; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; font-weight: 600; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
        .result {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            text-align: center;
        }
        .emi-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #28a745;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>EMI Calculator</h2>
    
    <div class="input-group">
        <label>Loan Amount (Principal)</label>
        <input type="number" id="principal" placeholder="e.g. 500000">
    </div>

    <div class="input-group">
        <label>Annual Interest Rate (%)</label>
        <input type="number" id="interest" step="0.1" placeholder="e.g. 8.5">
    </div>

    <div class="input-group">
        <label>Tenure (Months)</label>
        <input type="number" id="tenure" placeholder="e.g. 24">
    </div>

    <button onclick="calculateEMI()">Calculate</button>

    <div class="result" id="result-section" style="display:none;">
        <div>Monthly EMI</div>
        <div class="emi-value" id="emi-output">0</div>
        
        <div class="detail-row">
            <span>Total Interest:</span>
            <span id="total-interest">0</span>
        </div>
        <div class="detail-row">
            <span>Total Payment:</span>
            <span id="total-payment">0</span>
        </div>
    </div>
</div>

<script>
    function calculateEMI() {
        const P = parseFloat(document.getElementById('principal').value);
        const annualRate = parseFloat(document.getElementById('interest').value);
        const n = parseFloat(document.getElementById('tenure').value);

        if (!P || !annualRate || !n) {
            alert("Please fill in all fields correctly.");
            return;
        }

        // Monthly interest rate
        const r = annualRate / 12 / 100;

        // EMI Formula: P * r * (1 + r)^n / ((1 + r)^n - 1)
        const emi = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
        
        const totalPayment = emi * n;
        const totalInterest = totalPayment - P;

        // Display results
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('emi-output').innerText = emi.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('total-interest').innerText = totalInterest.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('total-payment').innerText = totalPayment.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }
</script>

</body>
</html>
